  <!-- Gold kaaba/shrine outline -->
  <g fill="none" stroke="#D4AF37" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Kaaba body -->
    <rect x="16" y="24" width="32" height="24" fill="none"/>
    <!-- Dome/arch -->
